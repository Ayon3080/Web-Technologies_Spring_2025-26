<!DOCTYPE html>
<html>
    <head>
        <script src="../script.js"></script>
    </head>
    <body>
        <script>
            document.write("<h1>Login From Test</h1>");
        </script>

        <table>
            <tr>
                <td>Email</td>
                 <td>
                    <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    onchange="return getEmail();"
                    />
                 </td>
                 <td><p id="emailErr" style="color: red;"></p></td>
            <tr>
                <td>Password</td>
             <td>
                <input
                 type="password"
                 id="password"
                 placeholder="Enter your password"
                 onkeyup="return getPassword();"
                />
             </td>
              <td><p id="passwordErr"></p></td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input
                    type="submit"
                    name="Login"
                    id="Login"
                    onclick="return collect_data();"
                    />

                </td>
            </tr>
        </table>
            
    </body>

</html>
